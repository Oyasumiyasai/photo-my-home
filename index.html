<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cloud Photo Frame</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --ink: #f5f5f2; --ink-dim: rgba(245,245,242,0.62); --accent: #d9a35a; }
        body { margin: 0; background: var(--bg); height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; color: var(--ink); cursor: default; }
        body.idle { cursor: none; }
        body.idle #gear { opacity: 0; pointer-events: none; }

        .slider-img { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; display: flex; align-items: center; justify-content: center; transition: opacity var(--fade-duration, 10s) ease-in-out; opacity: 0; }
        .slider-img img { max-width: 100vw; max-height: 100vh; object-fit: contain; }
        
        #gear { position: absolute; top: 22px; right: 22px; z-index: 20; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.4; transition: opacity 0.3s; }
        #gear:hover { opacity: 1; }
        #gear svg { width: 24px; height: 24px; stroke: white; }

        #clock-layer { 
            position: fixed; left: 30px; bottom: 30px; z-index: 10; padding: 16px 24px; 
            background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(8px);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 20px; width: fit-content;
        }
        .time-box { display: flex; flex-direction: column; }
        .time { font-family: 'Space Grotesk', sans-serif; font-weight: 300; font-size: 60px; line-height: 1; display: flex; align-items: baseline; }
        #seconds { font-size: 0.4em; color: var(--ink-dim); margin-left: 8px; font-variant-numeric: tabular-nums; }
        .date { font-size: 14px; color: var(--ink-dim); margin-top: 4px; }
        
        .weather-box { display: flex; align-items: center; gap: 10px; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 20px; }
        .weather-icon { width: 50px; }
        .weather-next { width: 25px; opacity: 0.8; }

        #settings { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
        #settings.open { display: flex; }
        #panel { width: 400px; background: #1a1a1c; padding: 30px; border-radius: 18px; color: #fff; }
        input { width: 100%; padding: 10px; margin: 8px 0 16px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--accent); border: none; padding: 12px; width: 100%; cursor: pointer; border-radius: 6px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="slider1" class="slider-img"><img src=""></div>
    <div id="slider2" class="slider-img"><img src=""></div>
    
    <div id="gear" onclick="openSettings()">
        <svg viewBox="0 0 24 24" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"></circle><path d="M19.4 13.5c.04-.5.04-1 0-1.5l2-1.6-2-3.4-2.4.8a7.6 7.6 0 0 0-1.3-.75L15 4.5h-4l-.4 2.6c-.46.2-.9.45-1.3.75l-2.4-.8-2 3.4 2 1.6c-.04.5-.04 1 0 1.5l-2 1.6 2 3.4 2.4-.8c.4.3.84.55 1.3.75l.4 2.6h4l.4-2.6c.46-.2.9-.45 1.3-.75l2.4.8 2-3.4-2-1.6Z"></path></svg>
    </div>
    
    <div id="clock-layer">
        <div class="time-box">
            <div class="time"><span id="hm">--:--</span><span id="seconds">00</span></div>
            <div class="date" id="dateText">----年--月--日</div>
        </div>
        <div class="weather-box">
            <img id="w-today" class="weather-icon" src="" alt="today">
            <img id="w-tomorrow" class="weather-next" src="" alt="tomorrow">
        </div>
    </div>

    <div id="settings">
        <div id="panel">
            <h2>設定</h2>
            <label>GAS URL</label><input type="text" id="gasUrl">
            <button onclick="saveAndStart()">保存して開始</button>
        </div>
    </div>

    <script>
        const API_KEY = "a7a3bc710598f612e917dfa61cd44a89";

        // 天気取得
        async function updateWeather() {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=Osaka,jp&appid=${API_KEY}&units=metric`);
                const data = await res.json();
                document.getElementById('w-today').src = `https://openweathermap.org/img/wn/${data.list[0].weather[0].icon}@2x.png`;
                document.getElementById('w-tomorrow').src = `https://openweathermap.org/img/wn/${data.list[8].weather[0].icon}@2x.png`;
            } catch(e) { console.error("天気取得失敗"); }
        }

        // 時計更新
        function updateClock() {
            const now = new Date();
            const days = ['日','月','火','水','木','金','土'];
            document.getElementById('dateText').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 (${days[now.getDay()]})`;
            document.getElementById('hm').innerText = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('seconds').innerText = now.getSeconds().toString().padStart(2, '0');
        }

        setInterval(updateClock, 1000);
        setInterval(updateWeather, 3600000); // 1時間ごとに天気更新
        updateClock();
        updateWeather();

        // (以前の保存・スライドショー処理と組み合わせ)
        function openSettings() { document.getElementById('settings').classList.add('open'); }
        function saveAndStart() {
            localStorage.setItem('gasUrl', document.getElementById('gasUrl').value);
            location.reload();
        }
        
        // 初回ロード時の処理
        if(!localStorage.getItem('gasUrl')) openSettings();
        // ここに以前作成したfetchPhotosの処理を統合してください
    </script>
</body>
</html>
