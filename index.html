<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Photo Frame</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        #slider { 
            width: 100vw; height: 100vh; 
            background-size: contain; background-repeat: no-repeat; background-position: center; 
            position: absolute; transition: opacity 10s ease-in-out; 
            opacity: 0; 
        }
        
        #clock-layer { 
            position: fixed; bottom: 40px; left: 40px; color: #fff; 
            pointer-events: none; z-index: 10; text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        #date { font-size: 24px; font-weight: 300; opacity: 0.7; margin-bottom: 5px; }
        #time { 
            font-size: 80px; font-weight: 200; letter-spacing: 2px;
            display: flex; align-items: baseline;
        }
        #seconds { font-size: 40px; margin-left: 10px; opacity: 0.6; font-weight: 300; }

        #setup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); color: #fff; padding: 40px; border-radius: 20px; z-index: 100; display: none; width: 80%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 8px; background: #222; color: #fff; box-sizing: border-box; }
        button { background: #fff; color: #000; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div id="slider"></div>
    <div id="clock-layer">
        <div id="date"></div>
        <div id="time">
            <span id="hours-minutes"></span><span id="seconds"></span>
        </div>
    </div>

    <div id="setup">
        <h3>初期設定</h3>
        <input type="text" id="gasUrl" placeholder="GASのデプロイURL">
        <button onclick="saveAndStart()">保存して開始</button>
    </div>

    <script>
        let photos = [];
        const slider = document.getElementById('slider');

        function updateClock() {
            const now = new Date();
            document.getElementById('date').innerText = now.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' });
            
            const hm = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', hour12: false });
            const sec = now.toLocaleTimeString('ja-JP', { second: '2-digit' });
            
            document.getElementById('hours-minutes').innerText = hm;
            document.getElementById('seconds').innerText = sec;
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchPhotos() {
            const url = localStorage.getItem('gasUrl');
            if (!url) return;
            try {
                const res = await fetch(url + (url.includes('?') ? '&' : '?') + 't=' + new Date().getTime());
                photos = await res.json();
                if (photos.length > 0) startSlideshow();
            } catch (e) {
                alert("データの取得に失敗しました。URLを確認してください。");
            }
        }

        function startSlideshow() {
            const change = () => {
                slider.style.opacity = 0;
                setTimeout(() => {
                    // ランダムに写真を選択
                    const randomPhoto = photos[Math.floor(Math.random() * photos.length)];
                    slider.style.backgroundImage = `url('${randomPhoto}')`;
                    slider.style.opacity = 1;
                }, 10000); // 10秒かけてクロスフェード
            };
            
            change();
            // 120秒表示 + 10秒フェード = 130秒周期
            setInterval(change, 130000); 
        }

        function saveAndStart() {
            localStorage.setItem('gasUrl', document.getElementById('gasUrl').value);
            location.reload();
        }

        if (!localStorage.getItem('gasUrl')) {
            document.getElementById('setup').style.display = 'block';
        } else {
            fetchPhotos();
        }

        slider.onclick = () => { if(confirm("設定をやり直しますか？")) { localStorage.clear(); location.reload(); } };
    </script>
</body>
</html>
