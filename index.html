<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cloud Photo Frame</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        #slider { 
            width: 100vw; height: 100vh; 
            background-size: contain; background-repeat: no-repeat; background-position: center; 
            position: absolute; transition: opacity 10s ease-in-out; /* クロスフェード10秒 */
            opacity: 0; 
        }
        
        /* スタイリッシュな時計デザイン */
        #clock-layer { 
            position: fixed; bottom: 40px; left: 40px; color: #fff; 
            pointer-events: none; z-index: 10;
        }
        #time { font-size: 80px; font-weight: 200; letter-spacing: 2px; }
        #date { font-size: 24px; font-weight: 300; opacity: 0.7; margin-bottom: 5px; }

        #setup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: #fff; padding: 40px; border-radius: 20px; z-index: 100; display: none; width: 80%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 8px; background: #222; color: #fff; }
        button { background: #fff; color: #000; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div id="slider"></div>
    <div id="clock-layer">
        <div id="date"></div>
        <div id="time"></div>
    </div>

    <div id="setup">
        <h3>初期設定</h3>
        <input type="text" id="gasUrl" placeholder="GASのデプロイURL">
        <button onclick="saveAndStart()">保存して開始</button>
    </div>

    <script>
        let photos = [];
        let index = 0;
        const slider = document.getElementById('slider');

        // 秒まで表示する時計
        function updateClock() {
            const now = new Date();
            document.getElementById('date').innerText = now.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' });
            document.getElementById('time').innerText = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchPhotos() {
            const url = localStorage.getItem('gasUrl');
            if (!url) return;
            const res = await fetch(url + '?t=' + new Date().getTime());
            photos = await res.json();
            startSlideshow();
        }

        function startSlideshow() {
            // 写真表示120秒、クロスフェード10秒
            const change = () => {
                slider.style.opacity = 0;
                setTimeout(() => {
                    slider.style.backgroundImage = `url('${photos[index]}')`;
                    slider.style.opacity = 1;
                    index = (index + 1) % photos.length;
                }, 10000); // フェード開始
            };
            
            // 初回実行
            change();
            setInterval(change, 130000); // 120秒表示 + 10秒フェード = 130秒周期
        }

        function saveAndStart() {
            localStorage.setItem('gasUrl', document.getElementById('gasUrl').value);
            location.reload();
        }

        if (!localStorage.getItem('gasUrl')) {
            document.getElementById('setup').style.display = 'block';
        } else {
            fetchPhotos();
        }
    </script>
</body>
</html>
