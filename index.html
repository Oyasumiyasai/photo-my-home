<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Photo Frame</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --ink: #f5f5f2; --ink-dim: rgba(245,245,242,0.62);
            --glass: rgba(18,18,20,0.58); --glass-border: rgba(245,245,242,0.10);
            --accent: #d9a35a; --accent-dim: rgba(217,163,90,0.35);
        }
        body { margin: 0; background: var(--bg); height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; color: var(--ink); }
        
        /* スライドショー */
        .slider-img {
            width: 100vw; height: 100vh;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            position: absolute; top: 0; left: 0;
            transition: opacity 10s ease-in-out;
            opacity: 0;
        }
        .slider-img::after {
            content:""; position:absolute; inset:0;
            background:linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 32%);
            pointer-events:none;
        }

        /* 時計 */
        #clock-layer { position: fixed; left: 40px; bottom: 34px; z-index: 10; user-select: none; }
        .time { font-family: 'Space Grotesk', sans-serif; font-weight: 300; font-size: 80px; line-height: 1; letter-spacing: 0.5px; display: flex; align-items: baseline; }
        #seconds { font-size: 0.32em; font-weight: 500; color: var(--ink-dim); margin-left: 6px; }
        .rule { width: 34px; height: 1px; background: var(--accent); margin: 10px 0 10px 2px; opacity: 0.85; }
        .date { font-size: 17px; font-weight: 500; color: var(--ink-dim); }

        /* 歯車アイコン */
        #gear {
            position: absolute; top: 22px; right: 22px; z-index: 20;
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0.4; transition: opacity 0.3s;
        }
        #gear:hover { opacity: 1; }
        #gear svg { width: 24px; height: 24px; stroke: white; fill: none; }

        /* 設定パネル */
        #settings { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        #settings.open { display: flex; }
        #panel { width: min(440px, 100%); background: #1a1a1c; border: 1px solid var(--glass-border); border-radius: 18px; padding: 30px; box-shadow: 0 30px 70px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 9px; background: #000; color: #fff; box-sizing: border-box; }
        button { background: var(--accent); color: #1a1208; border: none; padding: 12px 20px; border-radius: 9px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 10px; }
        #closeBtn { background: rgba(255,255,255,0.1); color: var(--ink); }
    </style>
</head>
<body>
    <div id="slider1" class="slider-img"></div>
    <div id="slider2" class="slider-img"></div>
    
    <div id="gear" onclick="openSettings()">
        <svg viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3.2"></circle>
            <path d="M19.4 13.5c.04-.5.04-1 0-1.5l2-1.6-2-3.4-2.4.8a7.6 7.6 0 0 0-1.3-.75L15 4.5h-4l-.4 2.6c-.46.2-.9.45-1.3.75l-2.4-.8-2 3.4 2 1.6c-.04.5-.04 1 0 1.5l-2 1.6 2 3.4 2.4-.8c.4.3.84.55 1.3.75l.4 2.6h4l.4-2.6c.46-.2.9-.45 1.3-.75l2.4.8 2-3.4-2-1.6Z"></path>
        </svg>
    </div>
    
    <div id="clock-layer">
        <div class="time">
            <span id="hours-minutes">--:--</span><span id="seconds">00</span>
        </div>
        <div class="rule"></div>
        <div class="date" id="dateText">----年--月--日（-）</div>
    </div>

    <div id="settings" onclick="closeSettings()">
        <div id="panel" onclick="event.stopPropagation()">
            <h2>フォトフレーム設定</h2>
            <input type="text" id="gasUrl" placeholder="GASのデプロイURL">
            <button onclick="saveAndStart()">保存して開始</button>
            <button id="closeBtn" onclick="closeSettings()">閉じる</button>
        </div>
    </div>

    <script>
        let photos = [];
        let currentSlider = 1;
        const s1 = document.getElementById('slider1');
        const s2 = document.getElementById('slider2');

        function updateClock() {
            const now = new Date();
            const days = ['日','月','火','水','木','金','土'];
            document.getElementById('dateText').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
            document.getElementById('hours-minutes').innerText = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('seconds').innerText = now.getSeconds().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchPhotos() {
            const url = localStorage.getItem('gasUrl');
            if (!url) return;
            try {
                const res = await fetch(url + (url.includes('?') ? '&' : '?') + 't=' + new Date().getTime());
                photos = await res.json();
                if (photos.length > 0) startSlideshow();
            } catch (e) { alert("取得エラー"); }
        }

        function startSlideshow() {
            s1.style.backgroundImage = `url('${photos[Math.floor(Math.random() * photos.length)]}')`;
            s1.style.opacity = 1;
            setInterval(() => {
                const nextPhoto = photos[Math.floor(Math.random() * photos.length)];
                if (currentSlider === 1) {
                    s2.style.backgroundImage = `url('${nextPhoto}')`;
                    s2.style.opacity = 1; s1.style.opacity = 0;
                    currentSlider = 2;
                } else {
                    s1.style.backgroundImage = `url('${nextPhoto}')`;
                    s1.style.opacity = 1; s2.style.opacity = 0;
                    currentSlider = 1;
                }
            }, 130000); 
        }

        function openSettings() { document.getElementById('settings').classList.add('open'); }
        function closeSettings() { document.getElementById('settings').classList.remove('open'); }
        function saveAndStart() {
            localStorage.setItem('gasUrl', document.getElementById('gasUrl').value);
            location.reload();
        }

        if (!localStorage.getItem('gasUrl')) document.getElementById('settings').classList.add('open');
        else fetchPhotos();
    </script>
</body>
</html>
